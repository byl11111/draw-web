<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPad Drawing</title>
<style>
  body, html { margin:0; padding:0; height:100%; overflow:hidden; background:white; }
  canvas { touch-action: none; }
</style>
</head>
<body>
<canvas id="drawCanvas"></canvas>

<script>
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.strokeStyle = 'black';
ctx.lineWidth = 5;
ctx.lineCap = 'round';

let drawing = false;

// ⚠️ 改成你的电脑 IP
const socket = new WebSocket("ws://100.79.173.73:8080");

socket.onopen = () => console.log("✅ 已连接 Unity");
socket.onerror = e => console.log("❌ 连接失败", e);

canvas.addEventListener('pointerdown', e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY);
    send(e);
});

canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    ctx.lineTo(e.clientX, e.clientY);
    ctx.stroke();
    send(e);
});

canvas.addEventListener('pointerup', () => drawing = false);

function send(e) {
    if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
            x: e.clientX,
            y: e.clientY,
            color: [0,0,0]
        }));
    }
}
</script>
</body>
</html>
