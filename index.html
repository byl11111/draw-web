<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 交互笔刷控制</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        /* 笔刷切换按钮样式 */
        #brush-selector { 
            position: fixed; top: 20px; left: 20px; 
            display: flex; gap: 15px; z-index: 100; 
        }
        .brush-btn { 
            padding: 12px 20px; background: #222; color: #fff; 
            border: 2px solid #002FA7; border-radius: 8px; cursor: pointer;
            transition: all 0.3s;
        }
        .brush-btn.active { background: #002FA7; box-shadow: 0 0 15px #002FA7; }
    </style>
</head>
<body>

    <div id="brush-selector">
        <div id="btn0" class="brush-btn active" onclick="setBrush(0)">烟雾笔</div>
        <div id="btn1" class="brush-btn" onclick="setBrush(1)">物理笔</div>
        <div id="btn2" class="brush-btn" onclick="setBrush(2)">循环笔</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let socket = new WebSocket(`ws://${window.location.hostname}:8080`);
        let currentBrush = 0;

        // 设置画布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 切换笔刷函数
        function setBrush(index) {
            currentBrush = index;
            // 更新按钮视觉状态
            document.querySelectorAll('.brush-btn').forEach((btn, i) => {
                btn.className = (i === index) ? 'brush-btn active' : 'brush-btn';
            });
        }

        function sendOsc(type, e) {
            if (socket.readyState !== WebSocket.OPEN) return;

            const touch = e.touches[0];
            const x = touch.clientX / window.innerWidth;
            const y = touch.clientY / window.innerHeight;
            const force = touch.force || 0.5;

            const msg = {
                address: "/brush/pos",
                args: [
                    { type: "f", value: x },
                    { type: "f", value: y },
                    { type: "f", value: force },
                    { type: "s", value: type },
                    { type: "i", value: currentBrush } // 发送当前笔刷索引
                ]
            };
            socket.send(JSON.stringify(msg));
        }

        canvas.addEventListener('touchstart', (e) => sendOsc('start', e));
        canvas.addEventListener('touchmove', (e) => sendOsc('move', e));
        canvas.addEventListener('touchend', (e) => {
            const msg = { address: "/brush/pos", args: [
                { type: "f", value: 0 }, { type: "f", value: 0 }, { type: "f", value: 0 }, 
                { type: "s", value: "end" }, { type: "i", value: currentBrush }
            ]};
            socket.send(JSON.stringify(msg));
        });
    </script>
</body>
</html>
