<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iPad Drawing to Unity</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: white;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drawing = false;

        // --- WebSocket 配置 ---
        // Unity 端需要开启 WebSocket Server
        // 替换成你电脑的局域网 IP 和端口，例如 ws://10.40.160.132:8080
        const ws = new WebSocket("ws://10.40.160.132:8080");

        ws.onopen = () => {
            console.log("✅ WebSocket 已连接 Unity！");
        };

        ws.onerror = (err) => {
            console.error("❌ WebSocket 连接失败：", err);
        };

        // --- 绘画事件 ---
        canvas.addEventListener('pointerdown', (e) => {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);

            // 发第一次点
            sendPoint(e.clientX, e.clientY);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!drawing) return;

            ctx.lineTo(e.clientX, e.clientY);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // 实时发送坐标
            sendPoint(e.clientX, e.clientY);
        });

        canvas.addEventListener('pointerup', () => {
            drawing = false;
        });
        canvas.addEventListener('pointerleave', () => {
            drawing = false;
        });

        // --- 发送数据给 Unity ---
        function sendPoint(x, y) {
            if (ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({
                    x: x / canvas.width,   // 归一化 0~1
                    y: y / canvas.height,
                    color: [0, 0, 0],       // 这里可以改成传笔刷颜色
                    lineWidth: 3
                });
                ws.send(message);
            }
        }
    </script>
</body>
</html>
